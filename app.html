<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fff8ed">
    <title>오늘 뭐 먹지? | 점심 메뉴 추천</title>
    <style>
        :root {
            --ink: #26221f;
            --muted: #7d746c;
            --line: #eadfd2;
            --paper: #fffdf9;
            --cream: #fff8ed;
            --orange: #ee6a3a;
            --orange-dark: #c94d22;
            --peach: #ffe3d4;
            --green: #3f7661;
            --shadow: 0 20px 60px rgba(104, 67, 35, .11);
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            background: var(--cream);
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        }

        body::before {
            position: fixed;
            z-index: -1;
            top: -180px;
            right: -120px;
            width: 460px;
            height: 460px;
            border-radius: 50%;
            background: #ffe6c7;
            content: "";
            opacity: .7;
        }

        .shell { width: min(1080px, calc(100% - 40px)); margin: 0 auto; padding: 28px 0 56px; }

        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 44px; }
        .brand { display: flex; align-items: center; gap: 11px; font-size: 17px; font-weight: 800; letter-spacing: -.04em; }
        .brand-mark { display: grid; width: 37px; height: 37px; place-items: center; border-radius: 13px; background: var(--orange); color: white; font-size: 18px; box-shadow: 0 8px 16px rgba(238, 106, 58, .24); }
        .status { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; font-weight: 700; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #58a77d; box-shadow: 0 0 0 4px #d9f1e1; }

        .intro { max-width: 620px; margin-bottom: 30px; }
        .eyebrow { margin: 0 0 13px; color: var(--orange-dark); font-size: 12px; font-weight: 800; letter-spacing: .14em; }
        h1 { margin: 0; font-size: clamp(34px, 5vw, 58px); line-height: 1.08; letter-spacing: -.07em; }
        .intro p { margin: 17px 0 0; color: var(--muted); font-size: 16px; line-height: 1.65; }

        .layout { display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(280px, .8fr); gap: 22px; align-items: start; }
        .card { border: 1px solid rgba(234, 223, 210, .8); border-radius: 28px; background: rgba(255, 253, 249, .84); box-shadow: var(--shadow); }
        .main-card { min-height: 510px; padding: clamp(24px, 5vw, 46px); }
        .section-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; color: var(--muted); font-size: 12px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
        .section-label span:last-child { color: #b7aaa0; letter-spacing: 0; text-transform: none; }
        .cuisine-tabs { display: flex; gap: 9px; margin-bottom: 34px; }
        .cuisine-tabs button { flex: 1; border: 1px solid var(--line); border-radius: 14px; padding: 13px 10px; color: var(--muted); background: white; cursor: pointer; font: inherit; font-size: 14px; font-weight: 800; transition: .2s ease; }
        .cuisine-tabs button:hover { border-color: #f2b397; color: var(--orange-dark); transform: translateY(-1px); }
        .cuisine-tabs button.active { border-color: var(--orange); color: white; background: var(--orange); box-shadow: 0 8px 17px rgba(238, 106, 58, .2); }

        .result { display: grid; min-height: 248px; padding: 28px; place-items: center; border-radius: 22px; background: var(--peach); text-align: center; }
        .result-kicker { margin: 0 0 12px; color: var(--orange-dark); font-size: 13px; font-weight: 800; }
        #menu { margin: 0; color: var(--ink); font-size: clamp(29px, 5vw, 45px); font-weight: 900; letter-spacing: -.07em; line-height: 1.22; }
        .recommend-button { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 18px; border: 0; border-radius: 15px; padding: 17px 20px; color: white; background: var(--ink); cursor: pointer; font: inherit; font-size: 15px; font-weight: 800; transition: .2s ease; }
        .recommend-button:hover { background: var(--orange); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(238, 106, 58, .2); }
        .recommend-button:active { transform: translateY(0); }
        .dice { font-size: 18px; }

        .history-card { padding: 28px; }
        .history-card h2 { margin: 0; font-size: 20px; letter-spacing: -.05em; }
        .history-card .subcopy { margin: 8px 0 24px; color: var(--muted); font-size: 13px; line-height: 1.5; }
        #recommendationList { display: flex; flex-direction: column; gap: 10px; padding: 0; margin: 0; list-style: none; }
        #recommendationList:empty::after { display: block; padding: 20px 0; color: #b7aaa0; content: "아직 추천받은 메뉴가 없어요"; font-size: 13px; text-align: center; }
        #recommendationList li { display: flex; align-items: center; gap: 11px; padding: 13px 14px; border: 1px solid var(--line); border-radius: 14px; background: white; font-size: 14px; font-weight: 750; }
        #recommendationList li::before { display: grid; width: 25px; height: 25px; flex: 0 0 25px; place-items: center; border-radius: 9px; color: var(--green); background: #e6f1eb; content: "✓"; font-size: 12px; font-weight: 900; }
        .tip { display: flex; gap: 10px; margin-top: 26px; padding: 14px; border-radius: 14px; color: var(--green); background: #edf6f0; font-size: 12px; line-height: 1.5; }
        .tip strong { display: block; margin-bottom: 2px; font-size: 13px; }

        @media (max-width: 760px) {
            .shell { width: min(100% - 28px, 560px); padding-top: 20px; }
            header { margin-bottom: 35px; }
            .status { display: none; }
            .layout { grid-template-columns: 1fr; }
            .main-card { min-height: 0; }
        }
        @media (max-width: 400px) {
            .cuisine-tabs button { padding-inline: 5px; font-size: 13px; }
            .main-card, .history-card { padding: 20px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <main class="shell">
        <header>
            <div class="brand"><span class="brand-mark">🍴</span> 오늘 뭐 먹지?</div>
            <div class="status"><span class="status-dot"></span> 오늘의 메뉴를 골라볼까요?</div>
        </header>

        <section class="intro">
            <p class="eyebrow">LUNCH PICKER</p>
            <h1>고민은 짧게,<br><span style="color: var(--orange);">맛있는 점심</span>은 확실하게.</h1>
            <p>먹고 싶은 스타일을 고르면<br>오늘의 메뉴를 행운처럼 뽑아드릴게요.</p>
        </section>

        <div class="layout">
            <section class="card main-card" aria-label="메뉴 추천">
                <div class="section-label"><span>01 · 취향 선택</span><span>원하는 메뉴판을 골라주세요</span></div>
                <div class="cuisine-tabs" role="group" aria-label="음식 종류">
                    <button type="button" class="active" data-cuisine="korean" onclick="setCuisine('korean')">🍚 한식</button>
                    <button type="button" data-cuisine="western" onclick="setCuisine('western')">🍝 양식</button>
                    <button type="button" data-cuisine="chinese" onclick="setCuisine('chinese')">🥢 중식</button>
                </div>
                <div class="section-label"><span>02 · 오늘의 결과</span><span>두근두근</span></div>
                <div class="result">
                    <div>
                        <p class="result-kicker">선택한 스타일의 추천 메뉴</p>
                        <div id="menu">여기를 클릭하여<br>점심 메뉴를 추천받으세요!</div>
                    </div>
                </div>
                <button type="button" class="recommend-button" onclick="recommendMenu()"><span class="dice">✦</span> 메뉴 추천받기</button>
            </section>

            <aside class="card history-card" id="recentRecommendations">
                <div class="section-label"><span>HISTORY</span><span>최근 5개</span></div>
                <h2>최근 추천 메뉴</h2>
                <p class="subcopy">오늘의 선택을 기록해둘게요.<br>다시 먹고 싶은 메뉴를 찾아보세요.</p>
                <ul id="recommendationList" aria-live="polite"></ul>
                <div class="tip"><span>💡</span><div><strong>작은 팁</strong>메뉴가 고민될 땐 눈을 감고 버튼을 눌러보세요.</div></div>
            </aside>
        </div>
    </main>

    <script>
        const { createClient } = supabase;
        const db = createClient("https://hpusguxlhmekgjmtuumr.supabase.co", "sb_publishable_PmJkTKCResfQtWSbPSeEzQ_CTa-vVnE");

        const menus = {
            korean: ['비빔밥', '김치찌개', '떡볶이', '삼겹살', '냉면', '오므라이스', '갈비탕'],
            western: ['피자', '햄버거', '샐러드', '스파게티'],
            chinese: ['짜장면', '짬뽕', '탕수육', '볶음밥']
        };

        let selectedCuisine = 'korean';
        const recentMenus = [];
        const cuisineNames = { korean: '한식', western: '양식', chinese: '중식' };

        document.addEventListener('DOMContentLoaded', async () => {
            await db.auth.signInAnonymously();
            await loadRecentMenus();
            document.getElementById('menu').textContent = `현재 선택된 메뉴: ${cuisineNames[selectedCuisine]}`;
            updateRecentRecommendations();
        });

        function setCuisine(cuisine) {
            selectedCuisine = cuisine;
            document.querySelectorAll('[data-cuisine]').forEach(button => {
                button.classList.toggle('active', button.dataset.cuisine === cuisine);
            });
            document.getElementById('menu').textContent = `현재 선택된 메뉴: ${cuisineNames[cuisine]}`;
        }

        async function recommendMenu() {
            const selectedMenus = menus[selectedCuisine];
            const randomIndex = Math.floor(Math.random() * selectedMenus.length);
            const recommendedMenu = selectedMenus[randomIndex];
            document.getElementById('menu').textContent = recommendedMenu;

            recentMenus.unshift(recommendedMenu);
            if (recentMenus.length > 5) recentMenus.pop();

            await insertMenu(recommendedMenu);
            updateRecentRecommendations();
        }

        async function insertMenu(menu) {
            await db.from('memos').insert([{ text: menu }]);
        }

        async function loadRecentMenus() {
            const { data } = await db.from('memos').select('text').order('id', { ascending: false }).limit(5);
            if (data) data.forEach(item => recentMenus.push(item.text));
        }

        function updateRecentRecommendations() {
            const recommendationList = document.getElementById('recommendationList');
            recommendationList.innerHTML = '';
            recentMenus.forEach(menu => {
                const listItem = document.createElement('li');
                listItem.textContent = menu;
                recommendationList.appendChild(listItem);
            });
        }
    </script>
</body>
</html>
